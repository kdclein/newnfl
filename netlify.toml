# Netlify configuration for NEWNFL.
# newnfl.com serves the Quality x Value quadrant app (Vite/React) built from app/.
# The build runs from the repo root (no base switch) so this root config stays
# the single source of truth; app/dist is the publish directory.
[build]
  command = "npm install --prefix app && npm run build --prefix app"
  publish = "app/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — serve the app shell for client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible security headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Hashed Vite assets are immutable — cache them aggressively.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
